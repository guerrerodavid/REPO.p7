services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: hello_db
    ports:
      - "3307:3306"

  web:
    image: python:3.9-slim
    volumes:
      - ./src:/app
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python app.py"
    ports:
      - "8080:5000"
    depends_on:
      - db
